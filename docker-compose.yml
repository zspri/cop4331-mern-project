services:
  frontend:
    hostname: frontend
    #build:
    #  context: ./mobile-app
    #  args:
    #    - EXPO_PUBLIC_API_BASE_URL=https://cop4331mern.zachspri.ng
    #image: mern/frontend
    image: ghcr.io/zspri/cop4331-mern-project-frontend:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    hostname: backend
    #build:
    #  context: ./backend
    #image: mern/backend
    image: ghcr.io/zspri/cop4331-mern-project-backend:latest
    volumes:
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/ping >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
