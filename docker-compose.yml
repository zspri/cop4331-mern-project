services:
  frontend:
    hostname: frontend
    build:
      context: ./mobile-app
    env:
      - "EXPO_PUBLIC_API_BASE_URL=https://cop4331mern.zachspri.ng"
    image: mern/frontend
    restart: unless-stopped

  backend:
    hostname: backend
    build:
      context: ./backend
    image: mern/backend
    volumes:
      - ./backend/.env:/app/.env:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
